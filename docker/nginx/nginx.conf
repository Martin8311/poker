worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 上游：两个应用实例。ip_hash 让同一客户端的 SockJS 会话粘到同一实例
    # （SockJS 的 HTTP 兜底传输是有会话的；跨实例的消息广播由 RabbitMQ Broker Relay 负责）
    upstream poker_backend {
        ip_hash;
        server app1:8080;
        server app2:8080;
    }

    # WebSocket 升级：有 Upgrade 头则 "upgrade"，否则 "close"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        client_max_body_size 10m;   # 允许头像上传

        # 普通 HTTP 请求
        location / {
            proxy_pass http://poker_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket / SockJS 端点（与 WebSocketConfig 的 addEndpoint("/ws") 对应）
        location /ws {
            proxy_pass http://poker_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;   # 长连接保活
            proxy_send_timeout 3600s;
        }
    }
}
