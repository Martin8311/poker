# Prometheus 抓取配置：每 15s 拉取两个应用实例的指标
# 直接抓 app1/app2（绕过 Nginx），这样每个实例的 instance 标签互相区分，可分别监控
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'poker-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'app1:8080'
          - 'app2:8080'
        labels:
          group: 'poker'
