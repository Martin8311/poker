# 本地多实例 + Nginx 负载均衡参考配置（非 Docker）
# 用法（任选其一）：
#   A. 直接用本文件整体替换本地 Nginx 的 conf/nginx.conf（最简单）
#   B. 把下面 http{} 内的 upstream / map / server 三段并入你现有的 conf/nginx.conf 的 http{} 中
# 前提：已启动 3 个应用实例（端口 8080/8081/8082），且它们连同一套 Redis/MySQL/RabbitMQ、均开启 WS_RELAY_ENABLED=true
# 启动后访问：http://localhost

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    # 三个本地应用实例。ip_hash 让同一客户端的 SockJS 会话粘到同一实例
    # （跨实例的消息广播由 RabbitMQ STOMP Broker Relay 负责）
    upstream poker_local {
        ip_hash;
        server 127.0.0.1:8080;
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
    }

    # WebSocket 升级：有 Upgrade 头则 "upgrade"，否则 "close"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;               # 入口端口；若 80 被占可改成 8000 等
        client_max_body_size 10m;   # 允许头像上传

        # 普通 HTTP 请求
        location / {
            proxy_pass http://poker_local;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket / SockJS 端点（与 WebSocketConfig 的 addEndpoint("/ws") 对应）
        location /ws {
            proxy_pass http://poker_local;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;   # 长连接保活
            proxy_send_timeout 3600s;
        }
    }
}
