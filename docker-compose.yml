services:
  mysql:
    image: mysql:5.7
    container_name: poker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-poker_root_pwd}
      MYSQL_DATABASE: poker
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: poker-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: poker-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 管理控制台 http://localhost:15672
      - "61613:61613"   # STOMP（供 WebSocket Broker Relay 使用）
    volumes:
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- 应用实例 1 ----------
  app1:
    build: .
    image: poker-app:latest
    container_name: poker-app1
    environment:
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-poker_root_pwd}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      WS_RELAY_ENABLED: "true"
      AVATAR_UPLOAD_PATH: /app/icon
    volumes:
      - avatar-data:/app/icon
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8080"

  # ---------- 应用实例 2（复用实例 1 构建的镜像，共享 MySQL / Redis / RabbitMQ）----------
  app2:
    image: poker-app:latest
    container_name: poker-app2
    environment:
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-poker_root_pwd}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      WS_RELAY_ENABLED: "true"
      AVATAR_UPLOAD_PATH: /app/icon
    volumes:
      - avatar-data:/app/icon
    depends_on:
      app1:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8080"

  # ---------- Nginx 负载均衡（统一入口 http://localhost）----------
  nginx:
    image: nginx:1.27-alpine
    container_name: poker-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  # ---------- Prometheus：抓取并存储各实例指标（http://localhost:9090）----------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: poker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - app1
      - app2

  # ---------- Grafana：可视化仪表盘（http://localhost:3000，默认 admin/admin）----------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: poker-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  avatar-data:
  prometheus-data:
  grafana-data:
