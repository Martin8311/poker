spring.application.name=game

server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# mysql
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/poker?useSSL=false&useUnicode=true&serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource

# Redis (Spring Boot 3.x use spring.data.redis.*)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:123456}
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# WebSocket broker relay config
app.websocket.relay.enabled=${WS_RELAY_ENABLED:true}
app.websocket.relay.host=${RABBITMQ_HOST:localhost}
app.websocket.relay.port=${RABBITMQ_STOMP_PORT:61613}
app.websocket.relay.user=${RABBITMQ_USER:guest}
app.websocket.relay.pass=${RABBITMQ_PASS:guest}

# WebSocket allowed CORS origins (comma-separated); default * for local dev, narrow to real domains in prod
app.websocket.allowed-origins=${WS_ALLOWED_ORIGINS:*}

# Spring Session: HttpSession to Redis
spring.session.store-type=redis
spring.session.timeout=30m
spring.session.redis.namespace=poker:session

# Room lease config
app.room.ttl-seconds=90
app.room.touch-interval-ms=30000

# Observability: Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Presence tracker
app.presence.ttl-ms=60000
app.presence.heartbeat-ms=20000
app.presence.cleanup-ms=30000

# Avatar storage path
avatar.upload.path = ${AVATAR_UPLOAD_PATH:D:/poker/icon}
avatar.access.prefix = /avatar/

# Disable static resource cache
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# Devtools
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources/static/

# Role permission bootstrap: usernames to auto-promote to ADMIN on startup (comma-separated, idempotent).
# Manual SQL: UPDATE user SET role='ADMIN' WHERE username='yourname';
app.bootstrap-admin-usernames=${APP_BOOTSTRAP_ADMINS:}

# Recharge plans (unit: fen, label shown on frontend)
# VIP
recharge.plan.VIP_30.days=30
recharge.plan.VIP_30.price=1000
recharge.plan.VIP_30.label=VIP 30 days

recharge.plan.VIP_90.days=90
recharge.plan.VIP_90.price=2500
recharge.plan.VIP_90.label=VIP 90 days (recommended)

recharge.plan.VIP_365.days=365
recharge.plan.VIP_365.price=8000
recharge.plan.VIP_365.label=VIP 365 days

# SVIP
recharge.plan.SVIP_30.days=30
recharge.plan.SVIP_30.price=3000
recharge.plan.SVIP_30.label=SVIP 30 days

recharge.plan.SVIP_90.days=90
recharge.plan.SVIP_90.price=8000
recharge.plan.SVIP_90.label=SVIP 90 days (recommended)

recharge.plan.SVIP_365.days=365
recharge.plan.SVIP_365.price=25000
recharge.plan.SVIP_365.label=SVIP 365 days

# Recharge anti-duplicate lock: same user can only place one order within ttl-seconds
recharge.lock.ttl-seconds=5

# Recharge payment gateway: mock | alipay (wechat is a stub, see WechatPaymentGateway)
recharge.gateway=${RECHARGE_GATEWAY:mock}

# Recharge order TTL (minutes) and cleanup interval (ms)
recharge.order.ttl-minutes=15
recharge.order.cleanup-interval-ms=60000

# Mock payment simulated delay (ms) before STOMP push
recharge.mock.delay-ms=1000

# Alipay gateway config (sandbox by default for local dev)
recharge.gateway.alipay.app-id=${ALIPAY_APP_ID:2021000123456789}
recharge.gateway.alipay.private-key=${ALIPAY_PRIVATE_KEY:}
recharge.gateway.alipay.public-key=${ALIPAY_PUBLIC_KEY:}
recharge.gateway.alipay.sandbox=${ALIPAY_SANDBOX:true}
recharge.gateway.alipay.notify-url-prefix=${ALIPAY_NOTIFY_URL_PREFIX:http://localhost:8080}

# Phone binding verification code
app.phone-verification.ttl-minutes=5
app.phone-verification.cooldown-seconds=60
# Local development helper: return the generated code in API response and log it.
app.phone-verification.debug-code=${PHONE_VERIFICATION_DEBUG:true}

# Human verification before sending phone SMS code
app.human-verification.challenge-ttl-seconds=180
app.human-verification.passed-ttl-seconds=120
app.human-verification.slider-tolerance=8
